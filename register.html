<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand d-flex align-items-center" href="home.html"><img src="logo.png" class="navbar-logo rounded-circle"> Register</a><ul class="navbar-nav ms-auto d-flex flex-row gap-2"><li class="nav-item"><a class="nav-link" href="home.html">Home</a></li><li class="nav-item"><a class="nav-link" href="home.html#events">Events</a></li><li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li><li class="nav-item"><a class="nav-link active" href="register.html">Registration</a></li><li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li></ul></div></nav>

  <main class="py-5">
    <div class="container container-smaller">
      <h1 class="fw-bold mb-4">Event Registration</h1>
      <div id="success" class="alert alert-success">Registration successful!</div>
      <div class="card"><div class="card-body">
        <form id="regForm" action="#success" method="get">
          <div class="row g-3">
            <div class="col-md-6"><input class="form-control" name="name" placeholder="Student Name" required></div>
            <div class="col-md-6"><input class="form-control" name="roll" placeholder="Roll Number" required></div>
            <div class="col-md-6"><input class="form-control" name="branch" placeholder="Branch" required></div>
            <div class="col-md-6"><input class="form-control" name="email" type="email" placeholder="Email" required></div>
            <div class="col-md-6"><input class="form-control" name="mobile" placeholder="Mobile Number" required></div>
            <div class="col-md-6"><select class="form-select" name="event" required><option value="">Select Event</option><option>Technical Quiz</option><option>Hackathon</option><option>Cultural Fest</option></select></div>
            <div class="col-12"><div class="form-check"><input class="form-check-input" id="agree" type="checkbox" required><label class="form-check-label" for="agree">I agree to the terms</label></div></div>
            <div class="col-12"><button class="btn btn-primary" type="submit">Submit</button></div>
          </div>
        </form>
      </div></div>
    </div>
  </main>

  
</body>
</html>
