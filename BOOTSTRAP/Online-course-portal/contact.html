<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Institute | Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
     <a class="navbar-brand fw-semibold d-flex align-items-center" href="home.html">
				<img src="logo.png" alt="Training Institute" class="navbar-logo rounded-circle " /> TRAINING INSTITUTE
			</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <h1 class="fw-bold mb-4">Contact Us</h1>
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-body">
              <form>
                <div class="mb-3"><label class="form-label">Name</label><input class="form-control" type="text"></div>
                <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email"></div>
                <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="4"></textarea></div>
                <button class="btn btn-primary" type="button">Send Message</button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-body">
              <h5>Address Information</h5>
              <p class="mb-3">123 Main Road, City Center</p>
              <img src="placeholder.jpg" alt="Map placeholder" class="img-fluid rounded w-100" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
