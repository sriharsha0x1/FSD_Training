<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Institute | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
     <a class="navbar-brand fw-semibold d-flex align-items-center" href="home.html">
				<img src="logo.png" alt="Training Institute" class="navbar-logo rounded-circle " /> TRAINING INSTITUTE
			</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div id="successAlert" class="alert alert-success d-none">Registration submitted successfully.</div>
      <h1 class="fw-bold mb-4">Student Registration</h1>
      <form class="row g-3" id="registerForm">
        <div class="col-md-6"><label class="form-label">Student Name</label><input class="form-control" type="text" required /></div>
        <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" required /></div>
        <div class="col-md-6"><label class="form-label">Mobile Number</label><input class="form-control" type="tel" minlength="10" maxlength="10" required /></div>
        <div class="col-md-6"><label class="form-label">Gender</label><select class="form-select" required><option value="">Choose</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div class="col-md-6"><label class="form-label">Course Selection</label><select class="form-select" required><option value="">Choose</option><option>Web Development</option><option>Python Programming</option><option>Data Science</option><option>AI & Machine Learning</option><option>Java Programming</option><option>Cloud Computing</option></select></div>
        <div class="col-md-6"><label class="form-label">Qualification</label><input class="form-control" type="text" required /></div>
        <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" rows="3" required></textarea></div>
        <div class="col-md-6"><label class="form-label">Upload Resume</label><input class="form-control" type="file" /></div>
        <div class="col-12 form-check ms-2"><input class="form-check-input" type="checkbox" required id="terms"><label class="form-check-label" for="terms">I accept the terms and conditions</label></div>
        <div class="col-12"><button class="btn btn-primary" type="submit">Submit</button></div>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('successAlert');
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      if (!form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }
      alertBox.classList.remove('d-none');
      form.reset();
      form.classList.remove('was-validated');
    });
  </script>
</body>
</html>
